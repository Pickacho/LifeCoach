services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-coach-app
    user: "root"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/coach.db
      - PORT=3000

  qdrant:
    image: qdrant/qdrant:latest
    container_name: life-coach-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
